<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Grid Practice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h2>My Page Layout</h2>

  <div class="layout">
    <div class="box header">Header</div>
    <div class="box sidebar">Sidebar</div>
    <div class="box main">Main Content</div>
    <div class="box footer">Footer</div>
  </div>

  <h2>Grid Line Numbers</h2>

  <div class="line-grid">
    <div class="box a">A</div>
    <div class="box b">B</div>
    <div class="box c">C</div>
    <div class="box d">D</div>
    <div class="box e">E</div>
  </div>


  <h2>Align & Justify</h2>

  <div class="align-grid">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box self-box">3 (self)</div>
    <div class="box">4</div>
  </div>

  <h2>Auto-fit Card Grid</h2>


  <div class="card-grid">
    <div class="box">Card 1</div>
    <div class="box">Card 2</div>
    <div class="box">Card 3</div>
    <div class="box">Card 4</div>
    <div class="box">Card 5</div>
  </div>


</body>
</html>
